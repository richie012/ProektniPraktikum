spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/internships}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  sql:
    init:
      mode: always

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update

jwt:
  secret: ${JWT_SECRET:my_super_secret_key_my_super_secret_key_123456}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
